name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Rust (build · test · lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # rust-embed needs web/dist to exist at compile time.
      - name: Seed embedded-assets placeholder
        run: |
          mkdir -p web/dist
          echo '<!doctype html><title>placeholder</title>' > web/dist/index.html
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets
      # `--workspace` builds the `fluxgate-waf-difftest` crate too, which compiles
      # the vendored libinjection C (via `cc`; the runner's gcc suffices) and runs
      # the Rust-port-vs-C differential test — auto-catching port drift.
      - name: Test
        run: cargo test --workspace
      # Non-gating perf canary: logs benign/attack ns-per-request so a gross
      # semantic-engine regression shows up in CI history. Hard thresholds: P3.
      - name: Bench smoke (non-gating)
        continue-on-error: true
        run: cargo test -p fluxgate-waf --release --test corpus -- --ignored --nocapture bench_semantic

  frontend:
    name: Web (typecheck · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - working-directory: web
        run: npm install
      - working-directory: web
        run: npm run build
